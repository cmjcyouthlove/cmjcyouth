<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>교회 나눔 질문 룰렛</title>
<style>
body{margin:0;font-family:'Malgun Gothic',sans-serif;background:linear-gradient(135deg,#6ea8fe,#d6e4ff);}
.wrap{max-width:980px;margin:auto;padding:30px}
h1{text-align:center;color:#fff}
.panel{background:white;border-radius:18px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button,select{padding:12px 18px;border:none;border-radius:10px;font-size:16px}
button{background:#4a6cf7;color:white;cursor:pointer}
button:hover{transform:scale(1.03)}
.card{margin:14px 0;padding:18px;border-radius:14px;background:#f6f8ff;opacity:0;transform:translateY(20px);animation:show .45s forwards}
@keyframes show{to{opacity:1;transform:none}}
#count{text-align:center;margin:15px;font-weight:bold}
footer{text-align:center;color:white;margin-top:20px}

<body><div class="wrap">

<div class="controls">
<select id="cat"></select>
<button onclick="draw()">🎲 질문 5개 뽑기</button>
<button onclick="copyQ()">📋 복사</button>
<button onclick="resetPool()">🔄 전체 초기화</button>
<button onclick="toggleFull()">🖥️ 전체화면</button>
</div>
<div id="count"></div>

</div>

let pool={};
for(const k in all) pool[k]=[...all[k]];
const sel=document.getElementById('cat');
sel.innerHTML='<option>전체</option>'+Object.keys(all).map(x=>`<option>${x}</option>`).join('');

function currentPool(){
 if(sel.value==="전체"){
   if(!pool["전체"]) pool["전체"]=Object.values(pool).flat();
   return pool["전체"];
 }
 return pool[sel.value];
}

function rebuildAll(){pool["전체"]=Object.values(all).flat().filter(q=>!used.has(q));}

let used=new Set();

function draw(){
 let arr;
 if(sel.value==="전체"){rebuildAll();arr=pool["전체"];}
 else arr=pool[sel.value];
 if(arr.length<5){alert("남은 질문이 부족합니다. 초기화를 눌러주세요.");return;}
 let out=[];
 for(let i=0;i<5;i++){let r=Math.floor(Math.random()*arr.length);let q=arr.splice(r,1)[0];used.add(q);out.push(q);}
 document.getElementById("list").innerHTML=out.map((q,i)=>`<div class="card" style="animation-delay:${i*0.08}s"><h3>${i+1}번 질문</h3><div>${q}</div></div>`).join("");
 document.getElementById("count").innerText="남은 질문 : "+arr.length+"개";
 window.current=out;
}

function copyQ(){
 if(!window.current)return;
 navigator.clipboard.writeText(window.current.map((q,i)=>`${i+1}. ${q}`).join("\n"));
 alert("복사되었습니다!");
}

function resetPool(){
 used.clear();
 for(const k in all) pool[k]=[...all[k]];
 rebuildAll();
 draw();
}

function toggleFull(){
 if(!document.fullscreenElement) document.documentElement.requestFullscreen();
 else document.exitFullscreen();
}
draw();
