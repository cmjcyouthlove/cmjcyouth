<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>충제청년부 나눔 질문</title>
    <style>
        :root { --primary: #5d8af8; --bg: #f8fbff; --text: #2d3748; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 24px; font-weight: 800; }
        
        .setup-box { background: #f0f4ff; padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .timer-input { width: 60px; padding: 5px; border-radius: 8px; border: 1px solid #cbd5e0; text-align: center; }
        
        .menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .category { padding: 12px; border: none; border-radius: 15px; background: #eef2f8; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .category.active { background: var(--primary); color: white; }
        
        .buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        button.action { flex: 1; padding: 15px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-draw { background: var(--primary); color: white; }
        .btn-copy { background: #e2e8f0; color: var(--text); }

        #timerDisplay { font-size: 24px; font-weight: bold; color: #ff6b6b; text-align: center; margin-bottom: 15px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #edf2f7; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.03); transform: translateY(20px); opacity: 0; }
        @keyframes appear { to { transform: translateY(0); opacity: 1; } }
        .animate { animation: appear 0.5s ease forwards; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 나눔 질문함</h1>
    
    <div class="setup-box">
        ⏱️ 나눔 시간 설정: <input type="number" id="timeInput" class="timer-input" value="3"> 분
    </div>

    <div class="menu">
        <button class="category active" data-category="all">전체보기</button>
        <button class="category" data-category="ice">아이스브레이킹</button>
        <button class="category" data-category="life">삶과 가치관</button>
        <button class="category" data-category="faith">신앙</button>
    </div>

    <div id="faithOption" style="text-align: center; margin-bottom: 15px;">
        <label><input type="checkbox" id="deepFaith"> 초신자 배려: 깊은 질문 제외</label>
    </div>

    <div id="timerDisplay"></div>

    <div class="buttons">
        <button class="action btn-draw" onclick="drawQuestions()">질문 뽑기</button>
        <button class="action btn-copy" onclick="copyQuestions()">복사하기</button>
    </div>

    <div id="questionContainer"></div>
</div>

<script>
    const DATA = {
        ice: ["가장 좋아하는 음식은?", "요즘 자주 듣는 노래는?", "가장 좋아하는 여행지는?", "내 인생 최고의 음식은?", "하루 중 가장 행복한 시간은?"],
        life: ["나를 한 단어로 표현한다면?", "내가 가장 중요하게 생각하는 가치는?", "최근 가장 뿌듯했던 일은?", "가장 닮고 싶은 사람은?", "10년 후 나는 어떤 모습일까?"],
        faith: ["교회에 처음 왔을 때 느낌은?", "하나님을 처음 생각한 때는?", "기도해 본 적 있나요?", "하나님은 나에게 어떤 분인가요?", "최근 감사했던 일은?"],
        deepFaith: ["나에게 고난이란 무엇인가?", "진정한 제자의 삶이란 무엇인가?", "하나님께 가장 맡기기 어려운 부분은?"]
    };

    let timerInterval;

    function startTimer() {
        clearInterval(timerInterval);
        let time = document.getElementById('timeInput').value * 60;
        const display = document.getElementById('timerDisplay');
        
        timerInterval = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            display.innerText = `⏳ 남은 시간: ${m}분 ${s < 10 ? '0'+s : s}초`;
            if (--time < 0) { clearInterval(timerInterval); display.innerText = "⏰ 나눔 시간이 종료되었습니다!"; }
        }, 1000);
    }

    document.querySelectorAll('.category').forEach(btn => btn.addEventListener('click', (e) => {
        document.querySelectorAll('.category').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('faithOption').style.display = (e.target.dataset.category === 'faith' || e.target.dataset.category === 'all') ? 'block' : 'none';
    }));

    function drawQuestions() {
        const cat = document.querySelector('.category.active').dataset.category;
        const excludeDeep = document.getElementById('deepFaith').checked;
        let pool = [];
        
        if(cat === 'all') pool = [...DATA.ice, ...DATA.life, ...DATA.faith, ...(excludeDeep ? [] : DATA.deepFaith)];
        else if(cat === 'ice') pool = [...DATA.ice];
        else if(cat === 'life') pool = [...DATA.life];
        else pool = [...DATA.faith, ...(excludeDeep ? [] : DATA.deepFaith)];

        const container = document.getElementById('questionContainer');
        container.innerHTML = "";
        startTimer(); // 질문 뽑을 때 타이머 시작

        for(let i=0; i<5; i++) {
            const q = pool[Math.floor(Math.random() * pool.length)];
            const div = document.createElement('div');
            div.className = 'card animate';
            div.style.animationDelay = `${i * 0.15}s`; // 촤르륵 나타나는 효과
            div.innerText = `${i+1}. ${q}`;
            container.appendChild(div);
        }
    }

    function copyQuestions() {
        const text = Array.from(document.querySelectorAll('.card')).map(c => c.innerText).join('\n');
        if(text) { navigator.clipboard.writeText(text); alert("복사되었습니다!"); }
    }
</script>
</body>
</html>
